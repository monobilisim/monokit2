mysql:
  # Process alarm threshold
  process-limit: 50
  # If credentals are not provided nor working, defaults to mysqld.sock and root user with no password
  credentials:
    user: "root"
    password: "password"
    host: "localhost"
    port: 3306
    dbname: "mysql"
    network: "tcp"
    socket: "/var/run/mysqld/mysqld.sock"
    allow_native_passwords: true
  auto-repair: # If enabled, monokit will run "mysql --auto-repair --all-databases" based on the weekly schedule.
    enabled: true
    day: "Sun" # Mon Tue Wed Thu Fri Sat Sun
    hour: "05:00" # 24h format, e.g. 05:00, 17:00
  alarm:
    enabled: true
  # Not implemented yet, can be added in the future versions
  cluster:
    enabled: false
    cluster_type: "" # ndb, xtradb
    size: 3
    check_table_day: "Sun"
    check_table_hour: "05:00"
    receive_queue_limit: 10
    flow_control_limit: 0.20

# Not Implemented Yet
mariadb:
  enabled: true
  process-limit: 50
  galera-cluster:
    enabled: false
    size: 3
    check_table_day: "Sun"
    check_table_hour: "05:00"
    receive_queue_limit: 10
    flow_control_limit: 0.20
  alarm:
    enabled: true

# Not Implemented Yet
postgres:
  limits:
    process: 50
    query: 25
    conn_percent: 70
  alarm:
    enabled: true
  leader_switch_hook: "echo 'leader switch'"
